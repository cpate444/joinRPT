  .backdrop::after{content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at center,transparent 52%,rgba(0,0,0,.55) 100%)}

  /* ============ CENTERED CARD ============ */
  .card{
    position:relative;z-index:1;
    width:100%;max-width:440px;
    background:var(--card);
    -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border:1px solid var(--line);
    padding:clamp(26px,4.5vh,40px) clamp(24px,4vw,40px) clamp(20px,3vh,30px);
    text-align:center;
    box-shadow:0 30px 70px rgba(0,0,0,.6);
  }

  /* logo + divider */
  .logo{height:clamp(46px,7vh,62px);width:auto;max-width:220px;
    filter:drop-shadow(0 3px 12px rgba(0,0,0,.7))}
  .rule{width:42px;height:1px;margin:clamp(14px,2.2vh,20px) auto;
    background:linear-gradient(to right,transparent,var(--gold),transparent)}

  .tag{font-family:'Montserrat',sans-serif;font-size:8.5px;letter-spacing:.44em;
    text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:12px}
  h1{font-family:'Montserrat',sans-serif;font-weight:200;
    font-size:clamp(22px,3.4vh,30px);letter-spacing:.05em;text-transform:uppercase;
    line-height:1.15;margin-bottom:10px}
  h1 em{font-style:normal;color:var(--gold-bright)}
  .sub{font-family:'Cormorant Garamond',serif;font-style:italic;
    color:var(--gold-bright);font-size:clamp(14px,2vh,17px);margin-bottom:clamp(16px,2.4vh,22px)}

  /* counter */
  .counter{display:flex;align-items:center;gap:12px;
    margin:0 0 clamp(16px,2.4vh,22px);
    font-family:'Montserrat',sans-serif;font-size:8.5px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--gold)}
  .counter b{color:var(--gold-bright);font-weight:500}
  .counter .bar{flex:1;height:2px;background:rgba(184,165,120,.16);border-radius:99px;overflow:hidden}
  .counter .bar i{display:block;height:100%;width:0;
    background:linear-gradient(to right,var(--gold-deep),var(--gold-bright));
    transition:width 1.4s cubic-bezier(.16,1,.3,1)}

  /* ============ FORM ============ */
  form{text-align:left}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  .field{margin-bottom:clamp(11px,1.7vh,15px)}
  .field.full{grid-column:1 / -1}
  .field label{display:block;font-family:'Montserrat',sans-serif;font-size:8px;
    letter-spacing:.3em;text-transform:uppercase;color:var(--gold);
    font-weight:500;margin-bottom:6px}
  .field input,.field select{width:100%;background:transparent;border:none;
    border-bottom:1px solid var(--line);color:var(--white);
    font-family:'Inter',sans-serif;font-size:14px;font-weight:300;
    padding:8px 2px;outline:none;border-radius:0;transition:border-color .3s ease;
    -webkit-appearance:none;appearance:none}
  .field input:focus,.field select:focus{border-bottom-color:var(--gold)}
  .field input::placeholder{color:var(--gray)}
  .field select{cursor:pointer;
    background-image:linear-gradient(45deg,transparent 50%,var(--gold) 50%),linear-gradient(135deg,var(--gold) 50%,transparent 50%);
    background-position:calc(100% - 12px) center,calc(100% - 7px) center;
    background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:20px}
  .field select:invalid{color:var(--gray)}
  .field select option{background:var(--panel-solid);color:var(--white)}

  .submit{width:100%;margin-top:clamp(14px,2vh,20px);
    padding:14px 18px;background:var(--gold);color:#1b1710;border:none;
    font-family:'Montserrat',sans-serif;font-size:9.5px;font-weight:500;
    letter-spacing:.4em;text-transform:uppercase;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:12px;
    transition:background .3s ease,box-shadow .3s ease,transform .2s ease;
    box-shadow:0 6px 24px rgba(184,165,120,.20)}
  .submit:hover{background:var(--gold-bright);box-shadow:0 10px 32px rgba(221,199,146,.3);transform:translateY(-1px)}
  .submit:active{transform:translateY(0)}
  .submit:disabled{opacity:.6;cursor:wait}
  .submit .arrow{font-size:14px;letter-spacing:0;transition:transform .3s ease}
  .submit:hover .arrow{transform:translateX(5px)}

  .note{margin-top:11px;font-size:9.5px;letter-spacing:.04em;color:var(--gray);text-align:center}
  .note span{color:var(--gold-deep)}

  .foot{margin-top:clamp(16px,2.4vh,22px);padding-top:clamp(14px,2vh,18px);
    border-top:1px solid var(--line-soft);
    font-family:'Montserrat',sans-serif;font-size:7.5px;letter-spacing:.4em;
    text-transform:uppercase;color:var(--gold-deep)}
  .foot .r{margin-right:-0.4em}

  /* ============ SUCCESS ============ */
  .success{padding:14px 0;animation:rise .6s cubic-bezier(.16,1,.3,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .success .mark{width:58px;height:58px;margin:0 auto 18px;border:1px solid var(--gold);
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:var(--gold);font-family:'Montserrat',sans-serif;font-size:24px;font-weight:300;
    box-shadow:0 0 0 6px rgba(184,165,120,.07)}
  .success .t{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gold-bright);font-size:24px;margin-bottom:10px}
  .success .s{color:var(--gray-soft);font-size:12.5px}

  /* ============ RESPONSIVE ============ */
  @media (max-width:440px){
    .grid{grid-template-columns:1fr}
    h1{font-size:21px}
  }
  /* very short screens: allow gentle scroll instead of clipping */
  @media (max-height:680px){
    body{align-items:flex-start;padding:16px 16px 28px}
  }
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
  }
</style>
</head>

          <option value="General fitness &amp; wellness">General wellness</option>
          <option value="Not sure yet">Not sure yet</option>
        </select>
      </div>
    </div>

    <!-- honeypot -->
    <div class="field" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;">
      <label for="hp_field">Leave empty</label>
      <input type="text" id="hp_field" name="hp_field" tabindex="-1" autocomplete="off" />
    </div>

    <button type="button" id="submit_btn" class="submit" onclick="submitWaitlist()">
      <span>Join the Waitlist</span>
      <span class="arrow">&rarr;</span>
    </button>

    <div class="note">Kept strictly private. <span>A reply within 48 hours.</span></div>
  </form>

  <div class="foot"><span class="r">RPT Athletic Club &middot; Los Angeles</span></div>
</main>

<script>
  var FORMSPREE_URL = 'https://formspree.io/f/xaqzdynw';

  window.addEventListener('load', function(){
    requestAnimationFrame(function(){
      var f=document.getElementById('fill'); if(f) f.style.width='60%';
    });
  });

  function submitWaitlist(){
    var nameEl=document.getElementById('name'),
        emailEl=document.getElementById('email'),
        phoneEl=document.getElementById('phone'),
        goalEl=document.getElementById('goal'),
        honeyEl=document.getElementById('hp_field'),
        btn=document.getElementById('submit_btn');

    var name=nameEl.value.trim(),email=emailEl.value.trim(),
        phone=phoneEl.value.trim(),goal=goalEl.value;

    if(!name){alert('Please enter your name.');nameEl.focus();return;}
    if(!email){alert('Please enter your email.');emailEl.focus();return;}
    if(!phone){alert('Please enter your phone number.');phoneEl.focus();return;}
    if(!goal){alert('Please select a primary goal.');goalEl.focus();return;}
    if(honeyEl && honeyEl.value){return;}

    btn.disabled=true;
    btn.querySelector('span:first-child').textContent='Submitting\u2026';

    fetch(FORMSPREE_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({name:name,email:email,phone:phone,goal:goal})
    }).then(function(res){
      if(res.ok){showSuccess();}
      else{return res.json().then(function(d){showError(d&&d.error?d.error:null);}).catch(function(){showError(null);});}
    }).catch(function(){showError(null);});
  }

  function showSuccess(){
    var form=document.getElementById('wl');
    form.innerHTML='<div class="success">'+
      '<div class="mark">&#10003;</div>'+
      '<div class="t">You&rsquo;re on the list.</div>'+
      '<div class="s">Our team will be in touch within 48 hours.</div>'+
    '</div>';
  }

  function showError(msg){
    var btn=document.getElementById('submit_btn');
    btn.disabled=false;
    btn.querySelector('span:first-child').textContent='Join the Waitlist';
    alert(msg||'Something went wrong. Please try again, or email shahin@rptbh.com directly.');
  }

  document.querySelectorAll('.field input,.field select').forEach(function(el){
    el.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();submitWaitlist();}});
  });
</script>

</body>
</html>
